<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lighthouse</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #130822;
      --text-primary: #fdf8ff;
      --text-secondary: #c4b5fd;
      --accent: #fbbf24;
      --btn-text: #1a0533;
      --input-border: rgba(255, 255, 255, 0.15);
      --font: 'Courier New', Courier, monospace;
    }

    html, body {
      height: 100svh;
      overflow: hidden;
    }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.7;
      position: relative;
    }

    /* ── FULL-SCREEN SVG BACKGROUND ── */
    .lighthouse-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .lighthouse-bg svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ── DARK GRADIENT — readability for form area ── */
    .bottom-fade {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 55%;
      background: linear-gradient(to top, rgba(19, 8, 34, 0.88) 0%, transparent 100%);
      z-index: 1;
      pointer-events: none;
    }

    /* ── CONTENT OVERLAY ── */
    .overlay {
      position: relative;
      z-index: 2;
      height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    /* ── TITLE ── */
    .title-area {
      flex-shrink: 0;
      text-align: center;
      padding: 28px 24px 0;
    }

    .site-name {
      font-family: var(--font);
      font-size: 15px;
      font-weight: 400;
      color: var(--accent);
      margin-bottom: 5px;
    }

    .site-tagline {
      font-family: var(--font);
      font-size: 15px;
      font-weight: 400;
      color: var(--accent);
    }

    .spacer { flex: 1; }

    /* ── WAITLIST ── */
    .content {
      width: 100%;
      max-width: 480px;
      padding: 0 24px 8px;
      text-align: center;
      flex-shrink: 0;
    }

    .waitlist-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      width: 100%;
      margin-bottom: 16px;
    }

    .waitlist-input {
      font-family: var(--font);
      font-size: 15px;
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--input-border);
      border-radius: 999px;
      padding: 13px 22px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .waitlist-input::placeholder {
      color: rgba(196, 181, 253, 0.4);
    }

    .waitlist-input:focus {
      border-color: rgba(251, 191, 36, 0.5);
    }

    .waitlist-btn {
      font-family: var(--font);
      font-size: 15px;
      font-weight: 700;
      color: var(--btn-text);
      background: var(--accent);
      border: none;
      border-radius: 999px;
      padding: 13px 36px;
      cursor: pointer;
      transition: filter 0.2s ease;
      width: 100%;
      letter-spacing: 0.02em;
    }

    .waitlist-btn:hover:not(:disabled) { filter: brightness(1.1); }
    .waitlist-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .waitlist-msg {
      font-family: var(--font);
      font-size: 13px;
      min-height: 20px;
      margin-bottom: 12px;
    }

    .waitlist-msg.success { color: var(--accent); }
    .waitlist-msg.error   { color: var(--text-secondary); }

    .subtext {
      font-family: var(--font);
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      opacity: 0.75;
      margin: 0 auto;
    }

    /* ── FOOTER ── */
    footer {
      flex-shrink: 0;
      padding: 16px 24px 20px;
      text-align: center;
    }

    footer p {
      font-family: var(--font);
      font-size: 12px;
      color: var(--text-secondary);
      opacity: 0.35;
      letter-spacing: 0.05em;
    }

    /* ── PULSATING LANTERN ── */
    @keyframes halo-pulse {
      0%, 100% { opacity: 0.75; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.18); }
    }

    @keyframes core-pulse {
      0%, 100% { opacity: 0.7;  transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.4); }
    }

    .lantern-halo {
      transform-box: fill-box;
      transform-origin: center;
      animation: halo-pulse 2.8s ease-in-out infinite;
    }

    .lantern-core {
      transform-box: fill-box;
      transform-origin: center;
      animation: core-pulse 2.8s ease-in-out infinite;
    }

    /* ── SHOOTING STARS ── */
    .shoot-1, .shoot-2, .shoot-3,
    .shoot-4, .shoot-5 { opacity: 0; }

    @keyframes shoot-1 {
      0%, 81%  { opacity: 0;    transform: translate(0, 0); }
      83%      { opacity: 0.9;  transform: translate(0, 0); }
      93%      { opacity: 0;    transform: translate(-72px, 60px); }
      100%     { opacity: 0;    transform: translate(-72px, 60px); }
    }
    @keyframes shoot-2 {
      0%, 77%  { opacity: 0;    transform: translate(0, 0); }
      79%      { opacity: 0.65; transform: translate(0, 0); }
      88%      { opacity: 0;    transform: translate(-58px, 48px); }
      100%     { opacity: 0;    transform: translate(-58px, 48px); }
    }
    @keyframes shoot-3 {
      0%, 83%  { opacity: 0;    transform: translate(0, 0); }
      85%      { opacity: 0.75; transform: translate(0, 0); }
      93%      { opacity: 0;    transform: translate(-65px, 54px); }
      100%     { opacity: 0;    transform: translate(-65px, 54px); }
    }
    @keyframes shoot-4 {
      0%, 87%  { opacity: 0;    transform: translate(0, 0); }
      89%      { opacity: 0.6;  transform: translate(0, 0); }
      96%      { opacity: 0;    transform: translate(-44px, 37px); }
      100%     { opacity: 0;    transform: translate(-44px, 37px); }
    }
    @keyframes shoot-5 {
      0%, 79%  { opacity: 0;    transform: translate(0, 0); }
      81%      { opacity: 0.82; transform: translate(0, 0); }
      90%      { opacity: 0;    transform: translate(-62px, 52px); }
      100%     { opacity: 0;    transform: translate(-62px, 52px); }
    }

    .shoot-1 { animation: shoot-1 11s linear infinite; animation-delay: 2s; }
    .shoot-2 { animation: shoot-2 17s linear infinite; animation-delay: 8s; }
    .shoot-3 { animation: shoot-3 13s linear infinite; animation-delay: 4.5s; }
    .shoot-4 { animation: shoot-4  8s linear infinite; animation-delay: 11s; }
    .shoot-5 { animation: shoot-5 15s linear infinite; animation-delay: 6s; }

    /* ── DESKTOP: side-by-side form ── */
    @media (min-width: 500px) {
      .waitlist-form {
        flex-direction: row;
        justify-content: center;
      }
      .waitlist-input {
        flex: 1;
        max-width: 260px;
      }
      .waitlist-btn {
        width: auto;
        flex-shrink: 0;
      }
    }
  </style>
</head>
<body>

  <!-- ── FULL-SCREEN LIGHTHOUSE BACKGROUND ── -->
  <div class="lighthouse-bg">
    <svg
      viewBox="0 0 400 520"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
      preserveAspectRatio="xMidYMid slice"
    >
      <defs>
        <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur stdDeviation="9" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="halo" x="-150%" y="-150%" width="400%" height="400%">
          <feGaussianBlur stdDeviation="13" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#080412"/>
          <stop offset="100%" stop-color="#1a0a2e"/>
        </linearGradient>
        <linearGradient id="towerGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#d8cfe8"/>
          <stop offset="50%"  stop-color="#f0ecf8"/>
          <stop offset="100%" stop-color="#c5bbd8"/>
        </linearGradient>
        <linearGradient id="rockGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#3d2e56"/>
          <stop offset="100%" stop-color="#1e1230"/>
        </linearGradient>
        <radialGradient id="lanternHaloGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#fbbf24" stop-opacity="0.5"/>
          <stop offset="40%"  stop-color="#f59e0b" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <!-- Sky -->
      <rect width="400" height="520" fill="url(#skyGrad)"/>

      <!-- ── SHOOTING STARS ── -->
      <g class="shoot-1">
        <line x1="348" y1="30" x2="363" y2="19" stroke="#fdf8ff" stroke-width="1.3" stroke-linecap="round"/>
      </g>
      <g class="shoot-2">
        <line x1="148" y1="24" x2="163" y2="13" stroke="#fdf8ff" stroke-width="1.0" stroke-linecap="round"/>
      </g>
      <g class="shoot-3">
        <line x1="290" y1="48" x2="305" y2="37" stroke="#fdf8ff" stroke-width="1.1" stroke-linecap="round"/>
      </g>
      <g class="shoot-4">
        <line x1="62"  y1="70" x2="77"  y2="59" stroke="#fdf8ff" stroke-width="0.9" stroke-linecap="round"/>
      </g>
      <g class="shoot-5">
        <line x1="218" y1="18" x2="233" y2="7"  stroke="#fdf8ff" stroke-width="1.0" stroke-linecap="round"/>
      </g>

      <!-- ── ROCKY BASE ── -->
      <ellipse cx="200" cy="480" rx="105" ry="22" fill="url(#rockGrad)"/>
      <path d="M 95 480 Q 110 455 135 458 Q 150 440 170 450 Q 185 432 200 440 Q 215 432 230 450 Q 250 440 265 458 Q 290 455 305 480 Z" fill="url(#rockGrad)"/>
      <path d="M 110 472 Q 140 452 170 458 Q 185 442 200 448 Q 215 442 230 458 Q 260 452 290 472" fill="none" stroke="rgba(150,120,200,0.18)" stroke-width="1"/>

      <!-- ── TOWER BODY ── -->
      <polygon points="182,445  218,445  214,270  186,270" fill="url(#towerGrad)"/>
      <polygon points="182,445  218,445  217.5,426  182.5,426" fill="rgba(160,140,190,0.22)"/>
      <polygon points="183.5,390  216.5,390  215.8,372  184.2,372" fill="rgba(160,140,190,0.18)"/>
      <polygon points="185,335  215,335  214.4,318  185.6,318"     fill="rgba(160,140,190,0.16)"/>
      <polygon points="186.5,290  213.5,290  213,275  187,275"     fill="rgba(160,140,190,0.14)"/>
      <line x1="182"   y1="427" x2="218"   y2="427" stroke="rgba(140,120,175,0.25)" stroke-width="0.8"/>
      <line x1="183.5" y1="373" x2="216.5" y2="373" stroke="rgba(140,120,175,0.22)" stroke-width="0.8"/>
      <line x1="185"   y1="319" x2="215"   y2="319" stroke="rgba(140,120,175,0.2)"  stroke-width="0.8"/>
      <line x1="186.5" y1="276" x2="213.5" y2="276" stroke="rgba(140,120,175,0.18)" stroke-width="0.8"/>
      <path d="M 194 445 L 194 430 Q 200 423 206 430 L 206 445 Z" fill="rgba(60,35,90,0.7)"/>

      <!-- ── GALLERY / RAILING ── -->
      <rect x="181" y="263" width="38" height="5" rx="2" fill="#b0a8c4"/>
      <line x1="183" y1="259" x2="183" y2="268" stroke="#c4b5d8" stroke-width="1.2"/>
      <line x1="188" y1="257" x2="188" y2="268" stroke="#c4b5d8" stroke-width="1.2"/>
      <line x1="193" y1="256" x2="193" y2="268" stroke="#c4b5d8" stroke-width="1.2"/>
      <line x1="200" y1="256" x2="200" y2="268" stroke="#c4b5d8" stroke-width="1.2"/>
      <line x1="207" y1="256" x2="207" y2="268" stroke="#c4b5d8" stroke-width="1.2"/>
      <line x1="212" y1="257" x2="212" y2="268" stroke="#c4b5d8" stroke-width="1.2"/>
      <line x1="217" y1="259" x2="217" y2="268" stroke="#c4b5d8" stroke-width="1.2"/>
      <path d="M 183 259 Q 200 254 217 259" fill="none" stroke="#c4b5d8" stroke-width="1.3"/>

      <!-- ── LANTERN ROOM ── -->
      <circle class="lantern-halo" cx="200" cy="232" r="52" fill="url(#lanternHaloGrad)" filter="url(#halo)"/>
      <polygon points="188,264  212,264  218,250  218,225  212,211  188,211  182,225  182,250" fill="#fbbf24" opacity="0.92"/>
      <polygon points="191,262  209,262  215,249  215,226  209,212  191,212  185,226  185,249" fill="#fde68a" opacity="0.55"/>
      <line x1="200" y1="212" x2="200" y2="264" stroke="rgba(180,100,10,0.5)" stroke-width="1.2"/>
      <line x1="182" y1="237" x2="218" y2="237" stroke="rgba(180,100,10,0.4)" stroke-width="1.2"/>
      <line x1="188" y1="211" x2="212" y2="264" stroke="rgba(180,100,10,0.25)" stroke-width="0.8"/>
      <line x1="212" y1="211" x2="188" y2="264" stroke="rgba(180,100,10,0.25)" stroke-width="0.8"/>
      <ellipse cx="200" cy="211" rx="18" ry="6" fill="#e0a800"/>
      <path d="M 182 211 Q 200 196 218 211" fill="#f5c430"/>
      <line x1="200" y1="196" x2="200" y2="178" stroke="#e0a800" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="200" cy="176" r="3" fill="#fbbf24"/>
      <circle class="lantern-core" cx="200" cy="237" r="9" fill="#fff7d6" opacity="0.9" filter="url(#glow)"/>
      <rect x="181" y="262" width="38" height="3" rx="1.5" fill="#c8960a"/>
    </svg>
  </div>

  <!-- ── BOTTOM FADE for readability ── -->
  <div class="bottom-fade"></div>

  <!-- ── CONTENT OVERLAY ── -->
  <div class="overlay">

    <div class="title-area">
      <p class="site-name">lighthouse</p>
      <p class="site-tagline">a little light goes a long way</p>
    </div>

    <div class="spacer"></div>

    <div class="content" id="waitlist">
      <form class="waitlist-form" id="waitlist-form" novalidate>
        <input
          class="waitlist-input"
          type="email"
          id="email-input"
          placeholder="your@email.com"
          autocomplete="email"
          required
        />
        <button class="waitlist-btn" type="submit" id="waitlist-btn">
          join the waitlist
        </button>
      </form>

      <p class="waitlist-msg" id="waitlist-msg" aria-live="polite"></p>

      <p class="subtext">
        share words of affirmation for someone,<br>and we'll reach out to them with warmth, anonymously
      </p>
    </div>

    <footer>
      <p>lighthouse &nbsp;&middot;&nbsp; made with care</p>
    </footer>

  </div>

  <script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyduPqOYZiyl9rOjfh25ZuNE_FSAXLtI2R2ZBLC10Hfev63ZhTGjEAf8RjU_uqAGlQ/exec';

    const form  = document.getElementById('waitlist-form');
    const input = document.getElementById('email-input');
    const btn   = document.getElementById('waitlist-btn');
    const msg   = document.getElementById('waitlist-msg');

    function isValidEmail(v) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim());
    }

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const emailValue = input.value.trim();
      msg.className = 'waitlist-msg';
      msg.textContent = '';

      if (!isValidEmail(emailValue)) {
        msg.className   = 'waitlist-msg error';
        msg.textContent = 'please enter a valid email address';
        input.focus();
        return;
      }

      btn.disabled    = true;
      input.disabled  = true;
      btn.textContent = 'sending…';

      try {
        await fetch(GOOGLE_SCRIPT_URL, {
          method:  'POST',
          mode:    'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body:    JSON.stringify({ email: emailValue, timestamp: new Date().toISOString() })
        });
        msg.className   = 'waitlist-msg success';
        msg.textContent = "you're on the list, thank you for sharing your light 🌟";
        btn.textContent = 'joined';
      } catch (err) {
        btn.disabled    = false;
        input.disabled  = false;
        btn.textContent = 'join the waitlist';
        msg.className   = 'waitlist-msg error';
        msg.textContent = 'something went wrong — try again shortly';
      }
    });
  </script>

</body>
</html>
